# Example: reverse-proxy security headers for the static SPA (production).
# Adjust CSP if you add inline scripts, CDNs, or third-party widgets.
# Place behind TLS termination (TLS 1.2+).

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# HSTS — only enable after HTTPS is stable site-wide
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Content-Security-Policy — tune script-src/style-src for your build (Vite/React typically script-src 'self')
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.yourdomain.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
